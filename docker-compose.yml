services:
  postgres:
    image: postgres:16-alpine
    container_name: cab_postgres
    restart: unless-stopped
    mem_limit: 1g
    environment:
      POSTGRES_USER: cab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cab}
      POSTGRES_DB: cab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cab -d cab']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: valkey/valkey:8-alpine
    container_name: cab_redis
    restart: unless-stopped
    mem_limit: 256m
    command: ['valkey-server', '--appendonly', 'yes', '--save', '300', '1']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: cab_app
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://cab:${POSTGRES_PASSWORD:-cab}@postgres:5432/cab
      REDIS_URL: redis://redis:6379/0
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-in-prod}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      AXIOM_TOKEN: ${AXIOM_TOKEN:-}
      AXIOM_DATASET: ${AXIOM_DATASET:-}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://us.i.posthog.com}
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    healthcheck:
      # N-6: busybox `wget` reports the container unhealthy even on HTTP 200.
      # Node is in the app image and respects the configured PORT.
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:'+(process.env.PORT||3000)+'/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
