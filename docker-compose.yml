services:
  postgres:
    image: postgres:16-alpine
    container_name: cab_postgres
    environment:
      POSTGRES_USER: cab
      POSTGRES_PASSWORD: cab
      POSTGRES_DB: cab_dev
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cab -d cab_dev']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: valkey/valkey:8-alpine
    container_name: cab_redis
    command: ['valkey-server', '--appendonly', 'yes', '--save', '300', '1']
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: cab_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://cab:cab@postgres:5432/cab_dev
      REDIS_URL: redis://redis:6379/0
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: 3000
      NODE_ENV: production
      AXIOM_TOKEN: ${AXIOM_TOKEN:-}
      AXIOM_DATASET: ${AXIOM_DATASET:-cab-prod}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://us.i.posthog.com}
    ports:
      - '127.0.0.1:3000:3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/healthz']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
