services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cab_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cardsagainstbhayanak}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cab}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "4823:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cab}:${POSTGRES_PASSWORD:-cab_secret}@postgres:5432/${POSTGRES_DB:-cardsagainstbhayanak}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
