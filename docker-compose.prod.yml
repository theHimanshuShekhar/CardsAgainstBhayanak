services:
  postgres:
    image: postgres:16-alpine
    container_name: cab_postgres
    restart: unless-stopped
    mem_limit: 1g
    environment:
      POSTGRES_USER: cab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cab -d cab']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: valkey/valkey:8-alpine
    container_name: cab_redis
    restart: unless-stopped
    mem_limit: 256m
    command: ['valkey-server', '--appendonly', 'yes', '--save', '300', '1']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: cab_app
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://cab:${POSTGRES_PASSWORD}@postgres:5432/cab
      REDIS_URL: redis://redis:6379/0
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: ${PORT:-3000}
      NODE_ENV: production
      AXIOM_TOKEN: ${AXIOM_TOKEN}
      AXIOM_DATASET: ${AXIOM_DATASET}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY}
      POSTHOG_HOST: ${POSTHOG_HOST}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:${PORT:-3000}/api/healthz']
      interval: 10s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cab_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
